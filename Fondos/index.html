<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainbow Space</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#123f73;
}

canvas{
    width:100vw;
    height:100vh;
    display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let border;

function resize(){

canvas.width = innerWidth;
canvas.height = innerHeight;

border = Math.min(canvas.width, canvas.height) * 0.05;

}

addEventListener("resize",resize);
resize();

const stars=[];

const starChars = [
"*",
"✦",
"✧",
"⋆",
"☆",
"✩",
"｡",
"·"
];

function randomStar(){

const x=Math.random()*(canvas.width-border*2)+border;
const y=Math.random()*(canvas.height-border*2)+border;

return{
x,
y,
size:Math.random()*12+8,
alpha:Math.random(),
speed:0.004+Math.random()*0.01,
offset:Math.random()*1000,
char:starChars[Math.floor(Math.random()*starChars.length)],

vx:(Math.random()-0.5)*0.15,
vy:(Math.random()-0.5)*0.15
};

}

for(let i=0;i<60;i++)
stars.push(randomStar());

const rainbow=[
"#ff0000",
"#ff8000",
"#ffff05",
"#00ff03",
"#007DE6",
"#6a00ff"
];

let shift=0;

function drawStar(s){

s.x += s.vx;
s.y += s.vy;
ctx.save();

if(s.x < border) s.x = canvas.width-border;
if(s.x > canvas.width-border) s.x = border;

if(s.y < border) s.y = canvas.height-border;
if(s.y > canvas.height-border) s.y = border;

ctx.globalAlpha = 0.2 + Math.abs(Math.sin(performance.now()*s.speed+s.offset))*0.8;

ctx.fillStyle = "white";
ctx.font = `${s.size}px "Segoe UI Symbol", "Noto Sans Symbols", Arial`;
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.fillText(s.char, s.x, s.y);

ctx.restore();

}

function drawBorder(){

const layers=7;

for(let i=0;i<layers;i++){

ctx.strokeStyle=rainbow[(i+shift)%rainbow.length];

ctx.lineWidth=10;

ctx.strokeRect(
i*8,
i*8,
canvas.width-i*16,
canvas.height-i*16
);

ctx.restore();

}

}

function animate(){

ctx.fillStyle="#123f73";
ctx.fillRect(0,0,canvas.width,canvas.height);

stars.forEach(drawStar);

drawBorder();

requestAnimationFrame(animate);

}

animate();

setInterval(()=>{

shift=(shift+1)%rainbow.length;

let cantidad = Math.floor(Math.random()*4)+1;

for(let i=0;i<cantidad;i++){

let s = stars[Math.floor(Math.random()*stars.length)];

s.offset = Math.random()*1000;
s.char = starChars[Math.floor(Math.random()*starChars.length)];

s.x = Math.random()*(canvas.width-border*2)+border;
s.y = Math.random()*(canvas.height-border*2)+border;

}

},500);

</script>

</body>
</html>
